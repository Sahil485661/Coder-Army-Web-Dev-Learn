<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <input type="text" id="display">
        <div class="button-container">
            <button class="button" onclick="container_value = '';
            document.querySelector('#display').value=container_value">C</button>
            <button class="button" onclick="container_value= container_value+'1';
            document.querySelector('#display').value=container_value">1</button>
            <button class="button" onclick="container_value= container_value +'2';
            document.querySelector('#display').value= container_value">2</button>
        
            <button class="button" onclick="container_value= container_value +'+';
            document.querySelector('#display').value= container_value">+</button>
            <button class="button" onclick="container_value= container_value +'3';
            document.querySelector('#display').value= container_value">3</button>
            <button class="button" onclick="container_value= container_value +'4';
            document.querySelector('#display').value= container_value">4</button>

            <button class="button" onclick="container_value= container_value +'-';
            document.querySelector('#display').value= container_value">-</button>
            <button class="button" onclick="container_value= container_value +'5';
            document.querySelector('#display').value= container_value">5</button>
            <button class="button" onclick="container_value= container_value +'6';
            document.querySelector('#display').value= container_value">6</button>
       
            <button class="button" onclick="container_value= container_value +'*';
            document.querySelector('#display').value= container_value">*</button>
            <button class="button" onclick="container_value= container_value +'7';
            document.querySelector('#display').value= container_value">7</button>
            <button class="button" onclick="container_value= container_value +'8';
            document.querySelector('#display').value= container_value">8</button>
        
            <button class="button" onclick="container_value= container_value +'/';
            document.querySelector('#display').value= container_value">/</button>
            <button class="button" onclick="container_value= eval(container_value);
            document.querySelector('#display').value= container_value">=</button>
            <button class="button">9</button>
        
            <button class="button" onclick="container_value= container_value +'0';
            document.querySelector('#display').value= container_value">0</button>
            <button class="button" onclick="container_value= container_value +'.';
            document.querySelector('#display').value= container_value">.</button>
        </div>
    </div>
    <script>
        let container_value = '';
        document.querySelector('#display').value =  container_value;
    </script>
</body>

</html>
