<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cricket game</title>
</head>
<body>
    <h1>Bat Ball Stump Game</h1>

    <button onclick="playGame('Bat')">Bat</button>
    <button onclick="playGame('Ball')">Ball</button>
    <button onclick="playGame('Stump')">Stump</button>

    <script>
        function playGame(userChoice) {
            let randomNumber = Math.random() * 3;
            let ComputerChoice;

            if (randomNumber < 1) ComputerChoice = 'Bat';
            else if (randomNumber < 2) ComputerChoice = 'Ball';
            else ComputerChoice = 'Stump';

            let resultMsg;
            if (userChoice === ComputerChoice) {
                resultMsg = 'This match is tie';
            } else if (
                (userChoice === 'Bat' && ComputerChoice === 'Ball') ||
                (userChoice === 'Ball' && ComputerChoice === 'Stump') ||
                (userChoice === 'Stump' && ComputerChoice === 'Bat')
            ) {
                resultMsg = 'You are won';
            } else {
                resultMsg = 'Computer is won';
            }

            alert(`You have chosen ${userChoice}. Computer has chosen ${ComputerChoice}. ${resultMsg}`);
        }
    </script>
</body>
</html>
