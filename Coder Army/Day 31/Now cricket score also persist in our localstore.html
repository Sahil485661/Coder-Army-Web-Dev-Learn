<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        body{
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Hello here you will play bat ball stump game..</h1>
    <button onclick="let userMove = 'Bat';
    let computerMove = compmove();  playGame(userMove, computerMove);">Bat</button>
    <button onclick="userMove = 'Ball';
    computerMove = compmove(); playGame(userMove, computerMove);">Ball</button>
    <button onclick="userMove = 'Stump';
    computerMove = compmove(); playGame(userMove, computerMove);">Stump</button>
    <h1 id="result"></h1>
    <button onclick="localStorage.clear('score');
    resetScore();
        document.querySelector('#result'). innerHTML =''">Reset</button>
    <script>
        let score;
        let scoreStr = localStorage.getItem('score');
        resetScore(scoreStr);
        function resetScore(scoreStr){
        score = scoreStr ? JSON.parse(scoreStr) : {
            Win : 0,
            Loss : 0,
            Tie : 0,
            
        };
        score.displayScore = function(){
                return `Total win: ${score.Win}
                 Total Loss: ${score.Loss}
                 Total Tie: ${score.Tie}`
            }
        }
        function compmove(){
            let move = Math.random()*3; let choice;
            if(move > 0 && move < 1){
                choice = 'Bat';
            }
            else if(move >1 && move < 2){
                choice = 'Ball';
            }
            else if(move > 2){
                choice ='Stump';
            }
            return `${choice}`;
        }
        function result( userMove, computerMove){
            let ans;
            if(userMove === 'Bat'){
                if(computerMove === 'Bat' ){
                    score.Tie ++;
                    ans = 'Tie'
                }
                else if(computerMove === 'Ball'){
                    score.Win ++;
                    ans = 'User Win'
                }
                else if(computerMove === 'Stump'){
                    score.Loss++;
                    ans = 'Computer Win';
                }
            }
            else if(userMove === 'Ball'){
                if(computerMove === 'Ball'){
                    score.Tie++;
                    ans = 'Tie'
                }
                else if(computerMove === 'Bat'){
                    score.Loss++;
                    ans = 'Computer Win';
                }
                else if(computerMove === 'Stump'){
                    score.Win++;
                    ans = 'User Win';
                }
            }
            else if(userMove === 'Stump'){
                if(computerMove === 'Ball'){
                    score.Loss++
                    ans = 'Computer Win';
                }
                else if(computerMove === 'Bat'){
                    score.Win++;
                    ans  = 'User Win';
                }
                else if (computerMove === 'Stump'){
                    score.Tie++;
                    ans = 'Tie'
                }
            }
            return `This match is ${ans}.`
            
        }
        function playGame(userMove, computerMove, ) {
            let finalWinner = result(userMove, computerMove)
            localStorage.setItem('score',JSON.stringify(score));
            document.querySelector('#result').innerHTML =
                `User has choosen '${userMove}'. Computer has choosen '${computerMove}'. '${finalWinner}' ${score.displayScore()}`
                // Total win: ${score.Win}
                // Total Loss: ${score.Loss}
                // Total Tie: ${score.Tie};
        }
    </script>
</body>
</html>
