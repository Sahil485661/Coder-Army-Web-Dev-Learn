<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let product = {
            name: 'Nike',
            category: 'Shoes',
            price: 4000,
            size: 'XL'
        }
        let product2 = {
            name: 'Adidas',
            category: 'Shoes',
            price: 4000,
            size: 'XL'
        }
        function isIdenticalProduct(product, product2){
            if(typeof product !== 'object' || typeof product2 !== 'object'){
                console.warn('The parameter are not object')
                return false;
        }
            if(product == product2){
                return true
            }
            if(product.name === product2.name &&
                product.category === product2.category &&
                product.price === product2.price){
                    return true;
            }
            else{
                return false;
            }
    }
    console.log(isIdenticalProduct(product, product2))
    console.log(isIdenticalProduct(product, 'product2'))
    </script>
</body>
</html>
