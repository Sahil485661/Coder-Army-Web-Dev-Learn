<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .single{
            width: 80px;
            height: 100px;
            background-color: green;
            font-size: medium;
        }
        .double{
            width: 160px;
            height: 50px;
            background-color: red;
            font-size: larger;
        }
    </style>
</head>
<body>
    <button class="single" onclick="setTimeout(max, 2000)">Modi hai toh Mumkin hai</button>
    <script>
        function max(){
            let before = document.querySelector(".single");
            before.className ='';
            before.classList.add('double');
        }
    </script>
</body>
</html>
