<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentos ZIndagi</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-content: center;
            flex-direction: column;
            height: 100vh;
        }
        div{
            border: 2px solid black;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* padding: 10px; */
        }
        button{
            display: inline-block;
            margin: 5px;
        }
        .red{
            background-color: red;
            color: white;
        }
        .yellow{
            background-color: yellow;
            color: rgb(112, 15, 202);
        }
        .gold{
            background-color: gold;
            color: white;
        }
        .green{
            background-color: green;
            color: wheat;
        }
    </style>
</head>
<body>
    <div>
        <h1> Background Colour changer </h1>
        <button onclick="magic('red')">Red</button>
        <button onclick="magic('yellow')">Yellow</button>
        <button onclick="magic('gold')">Gold</button>
        <button onclick="magic('green')">Green</button>
    </div>
    <script>
        function magic(BodyColor){
            document.querySelector("body").className = "";
            document.querySelector("body").classList.add(BodyColor);
            localStorage.setItem('color', BodyColor);

        }
        let color = localStorage.getItem('color');
        if(color){
            document.querySelector("body").className = "";
            document.querySelector("body").classList.add(color);
        }
       
    </script>
</body>
</html>
