<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Loop</title>
</head>
<body>
    <script>
        let a = 0;
        for(let i = 1; i<= 10; i++){
            console.log(a);
            a++;
        }
        console.log('Final Value of a: '+ a)
    </script>
</body>
</html>
