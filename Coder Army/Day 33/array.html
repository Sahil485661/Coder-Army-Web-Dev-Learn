<body>
    <script>
        let a = [3,4,1,5,6,7,8,9];
        console.log(Array.isArray(a));
        console.log(a.length);
        a.push(34);
        console.log(a)
        a.pop()
        console.log(a)
        a.shift(); // this is use for shift any value from front of the array
        
        console.log(a);
        a.unshift(32); //this unshift usee for put any value in the front of the array
        console.log(a)
        a.splice(2,3); //here first number show the index and next value show the amount how much number want delete.
        console.log(a)
        console.log(a.toString());
        
    </script>
